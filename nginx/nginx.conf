events {
    worker_connections 1024;
}

http {
    # ─────────────────────────────────────────
    # Upstream Services
    # ─────────────────────────────────────────
    upstream user_service {
        server user-service:3001;
    }

    upstream product_service {
        server product-service:3002;
    }

    upstream cart_service {
        server cart-service:3003;
    }

    upstream order_service {
        server order-service:3004;
    }

    upstream payment_service {
        server payment-service:3005;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ─────────────────────────────────────────
    # Main Server
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Enable gzip compression
        gzip on;
        gzip_types text/plain application/json application/javascript text/css;

        # ─── User / Auth Service ───
        location /api/auth/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Product Service ───
        location /api/products/ {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/categories/ {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Cart Service ───
        location /api/cart/ {
            proxy_pass http://cart_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Order Service ───
        location /api/orders/ {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Payment Service ───
        location /api/payments/ {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Health checks per service ───
        location /health/users {
            proxy_pass http://user_service/health;
        }
        location /health/products {
            proxy_pass http://product_service/health;
        }
        location /health/cart {
            proxy_pass http://cart_service/health;
        }
        location /health/orders {
            proxy_pass http://order_service/health;
        }
        location /health/payments {
            proxy_pass http://payment_service/health;
        }

        # ─── Frontend (catch-all) ───
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
